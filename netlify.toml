[build]
  command = "npm run build"
  publish = "build"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[dev]
  command = "cross-env HOST=localhost PORT=3001 BROWSER=none npm start"
  targetPort = 3001
  autoLaunch = false

[[redirects]]
  from = "/static/*"
  to = "/static/:splat"
  status = 200

[[redirects]]
  from = "/manifest.json"
  to = "/manifest.json"
  status = 200

[[redirects]]
  from = "/asset-manifest.json"
  to = "/asset-manifest.json"
  status = 200

[[redirects]]
  from = "/favicon.ico"
  to = "/favicon.ico"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
[[headers]]
  for = "/templates/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"