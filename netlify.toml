[build]
  command = "npm run build"
  publish = "build"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[dev]
  command = "cross-env HOST=localhost PORT=3000 BROWSER=none npm start"
  targetPort = 3000
  autoLaunch = false

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
[[headers]]
  for = "/templates/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"